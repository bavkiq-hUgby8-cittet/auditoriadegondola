<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Auditoria Gôndola — Mateus Mais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--s:#1a1d27;--s2:#22263a;--bd:#2e3250;
  --acc:#4f7cff;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;
  --t:#e8eaf0;--t2:#8b91b0;--t3:#4a5070;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-tap-highlight-color:transparent}
header{padding:14px 20px;background:var(--s);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}
.vtag{font-size:10px;font-family:'DM Mono',monospace;color:var(--ok);
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:2px 8px;border-radius:10px}
main{padding:20px;max-width:720px;margin:0 auto}
.api-bar{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:16px;display:flex;gap:8px;align-items:center}
.api-bar input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;
  color:var(--t);font-family:'DM Mono',monospace;font-size:11px;outline:none}
.api-bar input:focus{border-color:var(--acc)}
.api-bar .api-dot{width:8px;height:8px;border-radius:50%;background:var(--err);flex-shrink:0}
.api-bar .api-dot.ok{background:var(--ok)}
.api-bar label{font-size:11px;color:var(--t2);white-space:nowrap}
.mode-tabs{display:flex;gap:2px;background:var(--s2);border-radius:var(--r);padding:3px;margin-bottom:20px}
.mtab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:500;border-radius:10px;
  cursor:pointer;color:var(--t2);transition:all .15s}
.mtab.on{background:var(--s);color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.view{display:none}.view.on{display:block}
.score-row{display:flex;gap:10px;margin-bottom:16px}
.sc{flex:1;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.sc-n{font-size:26px;font-weight:600;font-family:'DM Mono',monospace}
.sc-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.shelf-block{margin-bottom:12px}
.shelf-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--t3);
  text-transform:uppercase;letter-spacing:.1em;padding:6px 0;border-bottom:1px solid var(--bd);margin-bottom:6px}
.item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(46,50,80,.5);font-size:13px}
.item:last-child{border-bottom:none}
.item-left{flex:1}
.item-brand{font-size:10px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.item-name{font-weight:500;color:var(--t);line-height:1.4}
.item-meta{font-size:11px;color:var(--t2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.meta-pill{background:var(--s2);border-radius:6px;padding:1px 6px;font-size:10px}
.conf-bar{height:2px;background:var(--bd);border-radius:1px;margin-top:5px;width:80px}
.conf-fill{height:100%;border-radius:1px}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;flex-shrink:0;margin-top:1px}
.b-ok{background:rgba(34,197,94,.12);color:var(--ok)}
.b-warn{background:rgba(245,158,11,.12);color:var(--warn)}
.b-err{background:rgba(239,68,68,.12);color:var(--err)}
.b-acc{background:rgba(79,124,255,.12);color:var(--acc)}
.obs-box{background:var(--s2);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;
  padding:12px;font-size:12px;color:var(--t2);line-height:1.7;margin:12px 0}
.total-bar{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.total-score{font-size:32px;font-weight:600;font-family:'DM Mono',monospace;color:var(--ok)}
.total-info{flex:1}
.total-title{font-size:14px;font-weight:500}
.total-sub{font-size:11px;color:var(--t2);margin-top:2px}
.prog{height:6px;background:var(--bd);border-radius:3px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;background:var(--ok);border-radius:3px}
.czone{background:var(--s);border:1.5px dashed var(--bd);border-radius:var(--r);
  padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.czone:hover{border-color:var(--acc)}
.czone.has{border-style:solid;border-color:var(--acc);padding:0;overflow:hidden}
.czone img{width:100%;border-radius:var(--r);display:none;max-height:300px;object-fit:cover}
.btn{width:100%;padding:13px;border-radius:var(--r);font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.btn-p{background:var(--acc);color:#fff}
.btn-p:hover{background:#6b91ff}
.btn-p:disabled{background:var(--s2);color:var(--t3);cursor:not-allowed}
.btn-g{background:var(--s);color:var(--t2);border:1px solid var(--bd)}
.btn-g:hover{border-color:var(--t2);color:var(--t)}
.pulse{display:none;text-align:center;background:var(--s);border:1px solid var(--bd);
  border-radius:var(--r);padding:24px;margin-bottom:14px}
.pulse.on{display:block}
.ring{width:44px;height:44px;border-radius:50%;border:2px solid var(--acc);
  background:rgba(79,124,255,.1);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;
  animation:spin 1.4s ease-in-out infinite}
@keyframes spin{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.ring-c{width:18px;height:18px;background:var(--acc);border-radius:50%;opacity:.8}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;
  padding:10px 12px;font-size:12px;color:#fca5a5;margin-bottom:10px;display:none}
.err-box.on{display:block}
select{width:100%;padding:11px;background:var(--s);border:1px solid var(--bd);
  border-radius:var(--r);color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:14px;cursor:pointer}
.prod-card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;margin-bottom:12px;transition:border-color .2s}
.prod-card:hover{border-color:var(--acc)}
.prod-card-inner{display:flex;gap:12px;padding:12px}
.prod-img{width:90px;height:90px;border-radius:8px;object-fit:contain;background:var(--s2);flex-shrink:0}
.prod-info{flex:1;min-width:0}
.prod-brand{font-size:10px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.prod-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.prod-details{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.prod-price{font-size:14px;font-weight:700;color:var(--ok);font-family:'DM Mono',monospace}
.prod-price-old{font-size:11px;color:var(--t3);text-decoration:line-through;font-family:'DM Mono',monospace}
.prod-cat{font-size:10px;color:var(--t2);background:var(--s2);padding:2px 8px;border-radius:6px}
.prod-barcode{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace}
.cat-status{font-size:11px;color:var(--t3);text-align:center;padding:8px;margin-bottom:12px;
  background:var(--s);border-radius:8px;border:1px solid var(--bd)}
.cat-status.loaded{color:var(--ok);border-color:rgba(34,197,94,.2)}
.id-summary{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px;margin-bottom:16px;text-align:center}
.id-count{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:var(--acc)}
.id-label{font-size:11px;color:var(--t2);margin-top:2px}

/* ═══ INTERACTIVE OVERLAY ═══ */
.ov-wrap{position:relative;margin-bottom:14px;border-radius:var(--r);overflow:hidden;background:#000;user-select:none}
.ov-wrap>img{width:100%;display:block}
.ov-box{position:absolute;border:2px solid;border-radius:4px;cursor:pointer;
  transition:box-shadow .15s,transform .15s;z-index:2}
.ov-box:hover,.ov-box.active{box-shadow:0 0 16px 2px currentColor;transform:scale(1.01);z-index:3}
.ov-tag{position:absolute;top:-1px;left:-1px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;
  padding:1px 5px;border-radius:0 0 4px 0;color:#fff;white-space:nowrap;pointer-events:none;line-height:1.4}
.ov-conf{position:absolute;top:-1px;right:-1px;font-size:8px;font-weight:600;font-family:'DM Mono',monospace;
  padding:1px 4px;border-radius:0 0 0 4px;color:#fff;pointer-events:none}

/* ═══ TOOLTIP / POPUP ═══ */
.ov-tooltip{display:none;position:fixed;z-index:100;background:var(--s);border:1px solid var(--bd);
  border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.6);padding:10px;width:260px;
  pointer-events:none;animation:fadeIn .15s ease}
.ov-tooltip.on{display:flex;gap:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ov-tooltip .tt-img{width:72px;height:72px;border-radius:8px;object-fit:contain;background:var(--s2);flex-shrink:0}
.ov-tooltip .tt-info{flex:1;min-width:0}
.ov-tooltip .tt-brand{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.ov-tooltip .tt-name{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:4px;color:var(--t);
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ov-tooltip .tt-price{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ok)}
.ov-tooltip .tt-cat{font-size:9px;color:var(--t2);margin-top:2px}
.ov-tooltip .tt-match{font-size:9px;padding:2px 6px;border-radius:4px;margin-top:4px;display:inline-block;font-weight:600}
.ov-tooltip .tt-bar{display:flex;align-items:center;gap:4px;margin-top:4px}
.ov-tooltip .tt-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* LEGEND */
.ov-legend{display:flex;gap:6px;flex-wrap:wrap;padding:10px;background:var(--s);border:1px solid var(--bd);
  border-radius:0 0 var(--r) var(--r);margin-top:-2px;margin-bottom:14px}
.ov-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2);
  padding:2px 6px;background:var(--s2);border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.ov-leg-item:hover,.ov-leg-item.hl{border-color:currentColor;color:var(--t)}
.ov-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>

<!-- TOOLTIP (global, repositioned on hover) -->
<div class="ov-tooltip" id="tooltip">
  <img class="tt-img" id="ttImg" src="" alt="">
  <div class="tt-info">
    <div class="tt-brand" id="ttBrand"></div>
    <div class="tt-name" id="ttName"></div>
    <div class="tt-price" id="ttPrice"></div>
    <div class="tt-cat" id="ttCat"></div>
    <div class="tt-bar"><div class="tt-swatch" id="ttSwatch"></div><span id="ttConf" style="font-size:9px;color:var(--t2)"></span></div>
    <div class="tt-match" id="ttMatch"></div>
  </div>
</div>

<header>
  <div class="logo"><div class="dot"></div>Auditoria Gôndola</div>
  <div class="vtag">Mateus Mais</div>
</header>
<main>
<div class="api-bar">
  <div class="api-dot" id="apiDot"></div>
  <label>OpenAI Key:</label>
  <input type="password" id="apiKey" placeholder="sk-proj-..." oninput="saveKey(this.value)">
</div>
<div class="mode-tabs">
  <div class="mtab on" onclick="setMode(0)">📸 Identificar</div>
  <div class="mtab" onclick="setMode(1)">📋 Auditar Gôndola</div>
</div>

<div class="view on" id="v0">
  <div class="cat-status" id="catStatus">⏳ Carregando catálogo…</div>
  <div class="czone" id="idZone" onclick="document.getElementById('idFile').click()">
    <img id="idPrev" alt="">
    <div id="idPh" style="padding:20px">
      <div style="font-size:28px;margin-bottom:8px">📷</div>
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">Foto do produto ou prateleira</div>
      <div style="font-size:11px;color:var(--t2)">Toque para abrir câmera</div>
    </div>
  </div>
  <input type="file" id="idFile" accept="image/*" capture="environment" onchange="loadImg(this,'id')" style="display:none">
  <div class="err-box" id="idErr"></div>
  <div class="pulse" id="idPulse">
    <div class="ring"><div class="ring-c"></div></div>
    <div style="font-size:13px;font-weight:500;margin-bottom:4px" id="idPl">Analisando…</div>
    <div style="font-size:11px;color:var(--t2)" id="idPs">Identificando produtos</div>
  </div>
  <button class="btn btn-p" id="idBtn" disabled onclick="identify()">🔍 Identificar Produtos</button>
  <button class="btn btn-g" onclick="document.getElementById('idFile').click()">Trocar imagem</button>
  <div id="idResults"></div>
</div>

<div class="view" id="v1">
  <select id="sel">
    <option value="">— Selecione a seção —</option>
    <option value="cafe">☕ Café completo</option>
    <option value="cappuccino">🧋 Cappuccinos</option>
    <option value="soluvel">🫙 Solúveis</option>
  </select>
  <div class="czone" id="auditZone" onclick="document.getElementById('auditFile').click()">
    <img id="auditPrev" alt="">
    <div id="auditPh" style="padding:20px">
      <div style="font-size:28px;margin-bottom:8px">📸</div>
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">Foto da gôndola</div>
      <div style="font-size:11px;color:var(--t2)">Toque para abrir câmera</div>
    </div>
  </div>
  <input type="file" id="auditFile" accept="image/*,video/*" capture="environment" onchange="loadImg(this,'audit')" style="display:none">
  <div class="err-box" id="auditErr"></div>
  <div class="pulse" id="auditPulse">
    <div class="ring"><div class="ring-c"></div></div>
    <div style="font-size:13px;font-weight:500;margin-bottom:4px" id="auditPl">Analisando…</div>
    <div style="font-size:11px;color:var(--t2)" id="auditPs">Identificando produtos</div>
  </div>
  <button class="btn btn-p" id="auditBtn" disabled onclick="audit()">🔍 Auditar gôndola</button>
  <button class="btn btn-g" onclick="document.getElementById('auditFile').click()">Trocar imagem</button>
  <div id="auditResults"></div>
</div>
</main>

<script>
// ── STATE ──
let catalog=[], catalogLoaded=false;
const imgs={id:null,audit:null}, imgSrcs={id:null,audit:null};

// ── API KEY ──
function saveKey(v){try{localStorage.setItem('oai_key',v)}catch(e){}document.getElementById('apiDot').classList.toggle('ok',v.startsWith('sk-'))}
function getKey(){const el=document.getElementById('apiKey');let k=el.value;if(!k){try{k=localStorage.getItem('oai_key')||''}catch(e){}el.value=k}document.getElementById('apiDot').classList.toggle('ok',k.startsWith('sk-'));return k}
window.addEventListener('DOMContentLoaded',()=>{getKey();loadCatalog()});

// ── OPENAI VISION ──
async function callVision(b64,prompt){
  const key=getKey();if(!key)throw new Error('Insira sua API key da OpenAI.');
  const res=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'gpt-4.1',max_tokens:4000,messages:[{role:'user',content:[
      {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64,detail:'high'}},
      {type:'text',text:prompt}
    ]}]})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'Erro OpenAI')}
  const data=await res.json();
  const txt=data.choices?.[0]?.message?.content||'';
  return JSON.parse(txt.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim());
}

// ── CATALOG ──
function loadCatalog(){
  const st=document.getElementById('catStatus');
  Papa.parse('catalogo_completo.csv',{download:true,header:true,skipEmptyLines:true,
    complete:r=>{catalog=r.data.filter(r=>r.id&&r.title);catalogLoaded=true;
      st.textContent='✅ Catálogo: '+catalog.length.toLocaleString()+' produtos';st.classList.add('loaded')},
    error:()=>{st.textContent='⚠️ Catálogo não encontrado.';st.style.color='var(--warn)'}
  });
}

// ── TABS ──
function setMode(n){
  document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.view').forEach((v,i)=>v.classList.toggle('on',i===n));
}

// ── IMAGE ──
function loadImg(inp,prefix){
  const f=inp.files[0];if(!f)return;
  const zone=document.getElementById(prefix+'Zone'),ph=document.getElementById(prefix+'Ph'),img=zone.querySelector('img');
  if(f.type.startsWith('image/')){
    const r=new FileReader();
    r.onload=e=>{img.src=e.target.result;img.style.display='block';ph.style.display='none';zone.classList.add('has');
      imgs[prefix]=e.target.result.split(',')[1];imgSrcs[prefix]=e.target.result;checkBtn(prefix)};
    r.readAsDataURL(f);
  } else if(f.type.startsWith('video/')){
    const v=document.createElement('video');v.preload='metadata';
    v.onloadeddata=()=>{v.currentTime=1};
    v.onseeked=()=>{const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
      c.getContext('2d').drawImage(v,0,0);const d=c.toDataURL('image/jpeg',.9);
      img.src=d;img.style.display='block';ph.style.display='none';zone.classList.add('has');
      imgs[prefix]=d.split(',')[1];imgSrcs[prefix]=d;checkBtn(prefix);URL.revokeObjectURL(v.src)};
    v.src=URL.createObjectURL(f);
  }
}
function checkBtn(p){
  if(p==='id')document.getElementById('idBtn').disabled=!imgs.id;
  else document.getElementById('auditBtn').disabled=!(imgs.audit&&document.getElementById('sel').value);
}
document.getElementById('sel').onchange=()=>checkBtn('audit');

// ══════════════════════════════════════
//  COLOR SYSTEM: unique color per product
// ══════════════════════════════════════
const PALETTE=[
  '#e6194b','#3cb44b','#4363d8','#f58231','#911eb4',
  '#42d4f4','#f032e6','#bfef45','#fabed4','#469990',
  '#dcbeff','#9A6324','#fffac8','#800000','#aaffc3',
  '#808000','#ffd8b1','#000075','#a9a9a9','#e6beff',
  '#ff6f61','#6b5b95','#88b04b','#f7cac9','#92a8d1',
  '#955251','#b565a7','#009b77','#dd4124','#45b8ac'
];
function getProductColor(name,idx,map){
  const key=(name||'').toLowerCase().trim();
  if(map.has(key))return map.get(key);
  const c=PALETTE[map.size%PALETTE.length];
  map.set(key,c);
  return c;
}

// ══════════════════════════════════════
//  INTERACTIVE OVERLAY (HTML divs)
// ══════════════════════════════════════
function buildOverlay(imgSrc, boxes, container){
  // boxes = [{ x,y,w,h, label, nome, conf, catalogMatch, status, productKey }]
  const wrap=document.createElement('div');
  wrap.className='ov-wrap';

  const img=document.createElement('img');
  img.src=imgSrc; img.alt='Foto analisada';
  wrap.appendChild(img);

  // Assign colors
  const colorMap=new Map();
  boxes.forEach(b=>{b._color=getProductColor(b.productKey||b.nome,0,colorMap)});

  // Create box divs
  boxes.forEach((b,i)=>{
    const div=document.createElement('div');
    div.className='ov-box';
    div.style.left=b.x+'%'; div.style.top=b.y+'%';
    div.style.width=b.w+'%'; div.style.height=b.h+'%';
    div.style.borderColor=b._color;
    div.style.background=b._color+'22';
    div.style.color=b._color;
    div.dataset.idx=i;

    // Tag label
    const tag=document.createElement('div');
    tag.className='ov-tag';
    tag.style.background=b._color;
    tag.textContent=(b.label||'').substring(0,18);
    div.appendChild(tag);

    // Conf badge
    if(b.conf){
      const conf=document.createElement('div');
      conf.className='ov-conf';
      conf.style.background=b._color;
      conf.textContent=Math.round(b.conf*100)+'%';
      div.appendChild(conf);
    }

    // Hover / touch events
    div.addEventListener('mouseenter',e=>showTooltip(e,b));
    div.addEventListener('mousemove',e=>moveTooltip(e));
    div.addEventListener('mouseleave',hideTooltip);
    div.addEventListener('touchstart',e=>{e.preventDefault();showTooltip(e.touches[0],b);div.classList.add('active')},{passive:false});
    div.addEventListener('touchend',()=>{setTimeout(hideTooltip,2000);div.classList.remove('active')});

    wrap.appendChild(div);
  });

  container.appendChild(wrap);

  // Legend (clickable, highlights same product)
  const leg=document.createElement('div');
  leg.className='ov-legend';
  const seen=new Set();
  boxes.forEach(b=>{
    const key=(b.productKey||b.nome||'').toLowerCase().trim();
    if(seen.has(key))return; seen.add(key);
    const item=document.createElement('div');
    item.className='ov-leg-item';
    item.style.color=b._color;
    item.innerHTML='<div class="ov-leg-dot" style="background:'+b._color+'"></div>'+(b.label||b.nome||'?');
    item.addEventListener('mouseenter',()=>{
      wrap.querySelectorAll('.ov-box').forEach(el=>{
        const bi=boxes[el.dataset.idx];
        const bk=(bi.productKey||bi.nome||'').toLowerCase().trim();
        el.style.opacity=bk===key?'1':'0.2';
      });
      item.classList.add('hl');
    });
    item.addEventListener('mouseleave',()=>{
      wrap.querySelectorAll('.ov-box').forEach(el=>el.style.opacity='1');
      item.classList.remove('hl');
    });
    leg.appendChild(item);
  });
  container.appendChild(leg);
}

function showTooltip(e,b){
  const tt=document.getElementById('tooltip');
  const ttImg=document.getElementById('ttImg');
  const cm=b.catalogMatch;

  if(cm&&cm.image_link){ttImg.src=cm.image_link;ttImg.style.display='block'}
  else{ttImg.style.display='none'}

  document.getElementById('ttBrand').textContent=cm?cm.brand||b.marca||'':b.marca||'';
  document.getElementById('ttBrand').style.color=b._color;
  document.getElementById('ttName').textContent=cm?cm.title:b.nome||'';

  const price=cm&&cm.price?cm.price.replace(' BRL',''):'';
  const sale=cm&&cm.sale_price?cm.sale_price.replace(' BRL',''):'';
  document.getElementById('ttPrice').textContent=sale?'R$'+sale:price?'R$'+price:'';

  document.getElementById('ttCat').textContent=cm?cm.categoria||'':b.categoria||'';
  document.getElementById('ttSwatch').style.background=b._color;
  document.getElementById('ttConf').textContent=b.conf?Math.round(b.conf*100)+'% confiança':'';

  const match=document.getElementById('ttMatch');
  if(cm){match.textContent='✅ No catálogo · '+cm.id;match.style.background='rgba(34,197,94,.15)';match.style.color='#22c55e'}
  else{match.textContent='⚠️ Não encontrado no catálogo';match.style.background='rgba(245,158,11,.15)';match.style.color='#f59e0b'}

  tt.classList.add('on');
  moveTooltip(e);
}
function moveTooltip(e){
  const tt=document.getElementById('tooltip');
  const x=e.clientX||e.pageX,y=e.clientY||e.pageY;
  const vw=window.innerWidth,vh=window.innerHeight;
  let left=x+16,top=y-60;
  if(left+270>vw)left=x-276;
  if(top<8)top=8;
  if(top+180>vh)top=vh-180;
  tt.style.left=left+'px';tt.style.top=top+'px';
}
function hideTooltip(){document.getElementById('tooltip').classList.remove('on')}

async function identify(){
  hideErr('id');
  document.getElementById('idBtn').style.display='none';
  document.querySelector('#v0 .btn-g').style.display='none';
  const pu=document.getElementById('idPulse');pu.classList.add('on');
  const msgs=['Analisando…','Lendo rótulos…','Identificando marcas…','Buscando catálogo…'];
  let mi=0;const tick=setInterval(()=>{document.getElementById('idPs').textContent=msgs[mi=(mi+1)%msgs.length]},1600);

  let hint='';
  if(catalogLoaded)hint='\n\nCatálogo parcial:\n'+catalog.slice(0,200).map(p=>p.id+'|'+p.title+'|'+(p.brand||'')).join('\n')+'\n(Total: '+catalog.length+')';

  try{
    const d=await callVision(imgs.id,
      'Você é um sistema de identificação de produtos de supermercado. Identifique TODOS os produtos visíveis.\n\n'+
      'IMPORTANTE: Retorne o BOUNDING BOX de cada produto como % da imagem (x,y = canto superior esquerdo, w,h = tamanho).\n'+
      'Se o MESMO produto aparece em vários locais, retorne uma entrada para CADA ocorrência (mesmo nome/id, bbox diferente).\n\n'+
      'Campos: nome (marca+tipo+peso), marca, categoria, conf (0-1), texto_legivel, barcode, catalog_id, bbox {x,y,w,h}.'+hint+
      '\n\nRetorne APENAS JSON:\n{"produtos":[{"nome":"","marca":"","categoria":"","conf":0.0,"texto_legivel":"","barcode":"","catalog_id":"","bbox":{"x":0,"y":0,"w":0,"h":0}}],"total":0,"obs":""}');
    clearInterval(tick);pu.classList.remove('on');
    renderIdentified(d);
  }catch(e){
    clearInterval(tick);pu.classList.remove('on');
    document.getElementById('idBtn').style.display='';document.querySelector('#v0 .btn-g').style.display='';
    showErr('id',e.message);
  }
}

function renderIdentified(data){
  const results=document.getElementById('idResults');results.innerHTML='';
  const prods=data.produtos||[];

  // Match with catalog & build boxes
  const boxes=[];
  let matched=0,unmatched=0;
  prods.forEach(p=>{
    let cm=null;
    if(catalogLoaded){
      if(p.catalog_id)cm=catalog.find(c=>c.id===p.catalog_id);
      if(!cm&&p.barcode)cm=catalog.find(c=>c.barcode===p.barcode);
      if(!cm)cm=fuzzyMatch(p.nome,p.marca);
    }
    if(cm)matched++;else unmatched++;
    if(p.bbox&&(p.bbox.w>0||p.bbox.h>0)){
      boxes.push({x:p.bbox.x,y:p.bbox.y,w:p.bbox.w,h:p.bbox.h,
        label:p.marca||'',nome:p.nome,marca:p.marca,categoria:p.categoria,
        conf:p.conf,catalogMatch:cm,status:cm?'ok':'warn',
        productKey:cm?cm.id:p.nome});
    }
  });

  // Overlay
  if(boxes.length&&imgSrcs.id)buildOverlay(imgSrcs.id,boxes,results);

  // Summary + cards
  let html='<div class="id-summary"><div class="id-count">'+prods.length+'</div>'+
    '<div class="id-label">produto'+(prods.length!==1?'s':'')+' identificado'+(prods.length!==1?'s':'')+'</div></div>';
  if(data.obs)html+='<div class="obs-box">💡 '+data.obs+'</div>';

  // Deduplicated product cards
  const seen=new Map();
  prods.forEach(p=>{
    let cm=null;
    if(catalogLoaded){
      if(p.catalog_id)cm=catalog.find(c=>c.id===p.catalog_id);
      if(!cm&&p.barcode)cm=catalog.find(c=>c.barcode===p.barcode);
      if(!cm)cm=fuzzyMatch(p.nome,p.marca);
    }
    const key=cm?cm.id:p.nome;
    if(seen.has(key)){seen.get(key).count++;return}
    seen.set(key,{p,cm,count:1});
  });

  seen.forEach(({p,cm,count})=>{
    if(cm){
      const price=cm.price?cm.price.replace(' BRL',''):'';
      const sale=cm.sale_price?cm.sale_price.replace(' BRL',''):'';
      const conf=Math.round((p.conf||.8)*100);
      html+='<div class="prod-card"><div class="prod-card-inner">'+
        '<img class="prod-img" src="'+(cm.image_link||'')+'" alt="" onerror="this.style.display=\'none\'">'+
        '<div class="prod-info"><div class="prod-brand">'+(cm.brand||p.marca||'')+'</div>'+
        '<div class="prod-name">'+cm.title+(count>1?' <span style="color:var(--acc)">(×'+count+')</span>':'')+'</div><div class="prod-details">'+
        (sale?'<span class="prod-price">R$'+sale+'</span><span class="prod-price-old">R$'+price+'</span>':price?'<span class="prod-price">R$'+price+'</span>':'')+
        '<span class="prod-cat">'+(cm.categoria||'')+'</span>'+
        '</div></div><div class="badge '+(conf>=90?'b-ok':conf>=70?'b-warn':'b-err')+'">'+conf+'%</div></div></div>';
    }else{
      const conf=Math.round((p.conf||.5)*100);
      html+='<div class="prod-card" style="border-color:var(--warn)"><div class="prod-card-inner">'+
        '<div style="width:90px;height:90px;background:var(--s2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">📦</div>'+
        '<div class="prod-info"><div class="prod-brand">'+(p.marca||'?')+'</div>'+
        '<div class="prod-name">'+p.nome+(count>1?' <span style="color:var(--acc)">(×'+count+')</span>':'')+'</div><div class="prod-details">'+
        '<span class="prod-cat">'+(p.categoria||'')+'</span>'+
        '</div></div><div class="badge b-warn">'+conf+'%</div></div></div>';
    }
  });

  if(catalogLoaded)html+='<div class="obs-box">📊 <strong>Match:</strong> '+matched+' no catálogo · '+unmatched+' sem correspondência</div>';
  html+='<button class="btn btn-g" style="margin-top:12px" onclick="resetIdentify()">Nova identificação</button>';
  results.insertAdjacentHTML('beforeend',html);
  results.scrollIntoView({behavior:'smooth',block:'start'});
}

function fuzzyMatch(nome,marca){
  if(!nome)return null;
  const terms=nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').split(/\s+/).filter(t=>t.length>2);
  let best=null,bestS=0;
  for(const item of catalog){
    const title=(item.title||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    let s=0;for(const t of terms){if(title.includes(t))s++}
    if(marca&&item.brand&&item.brand.toLowerCase().includes(marca.toLowerCase().substring(0,4)))s+=2;
    if(s>bestS&&s>=Math.min(3,terms.length*.5)){bestS=s;best=item}
  }
  return best;
}

async function audit(){
  const sec=document.getElementById('sel').value;
  if(!sec){showErr('audit','Selecione uma seção.');return}
  hideErr('audit');
  document.getElementById('auditBtn').style.display='none';document.querySelector('#v1 .btn-g').style.display='none';
  const pu=document.getElementById('auditPulse');pu.classList.add('on');
  const msgs=['Identificando marcas…','Contando facings…','Detectando rupturas…','Conformidade…'];
  let mi=0;const tick=setInterval(()=>{document.getElementById('auditPs').textContent=msgs[mi=(mi+1)%msgs.length]},1600);
  const prods=(CAT_AUDIT[sec]||[]).map(l=>{const[id,name,brand]=l.split('|');return'- ['+id+'] '+name+' ('+brand+')'}).join('\n');

  try{
    const d=await callVision(imgs.audit,
      'Auditoria de gôndola. Analise shelf por shelf.\n\n'+
      'BOUNDING BOX obrigatório para cada produto (% da imagem: x,y,w,h). Mesmo produto em locais diferentes = entradas separadas com mesmo id.\n\n'+
      'Produtos esperados:\n'+prods+'\n\n'+
      'JSON sem markdown:\n'+
      '{"encontrados":[{"id":"","nome":"","facings":0,"shelf":"","conf":0.0,"bbox":{"x":0,"y":0,"w":0,"h":0}}],'+
      '"baixo":[{"id":"","nome":"","facings":0,"obs":"","bbox":{"x":0,"y":0,"w":0,"h":0}}],'+
      '"ausentes":["id1"],"extras":[{"desc":"","bbox":{"x":0,"y":0,"w":0,"h":0}}],"score":0,"obs":""}');
    clearInterval(tick);pu.classList.remove('on');
    renderAudit(d,CAT_AUDIT[sec]||[]);
  }catch(e){
    clearInterval(tick);pu.classList.remove('on');
    document.getElementById('auditBtn').style.display='';document.querySelector('#v1 .btn-g').style.display='';
    showErr('audit',e.message);
  }
}

function renderAudit(d,catList){
  const results=document.getElementById('auditResults');results.innerHTML='';
  const ok=d.encontrados||[],low=d.baixo||[],miss=d.ausentes||[],extras=d.extras||[],score=d.score||0;

  // Build boxes
  const boxes=[];
  ok.forEach(p=>{
    const cm=catalogLoaded?catalog.find(c=>c.id===p.id):null;
    if(p.bbox&&(p.bbox.w>0||p.bbox.h>0))
      boxes.push({x:p.bbox.x,y:p.bbox.y,w:p.bbox.w,h:p.bbox.h,label:p.nome||'',nome:p.nome,
        marca:'',conf:p.conf,catalogMatch:cm,status:'ok',productKey:p.id||p.nome});
  });
  low.forEach(p=>{
    const cm=catalogLoaded?catalog.find(c=>c.id===p.id):null;
    if(p.bbox&&(p.bbox.w>0||p.bbox.h>0))
      boxes.push({x:p.bbox.x,y:p.bbox.y,w:p.bbox.w,h:p.bbox.h,label:'⚠ '+(p.nome||''),nome:p.nome,
        marca:'',conf:null,catalogMatch:cm,status:'warn',productKey:p.id||p.nome});
  });
  if(Array.isArray(extras))extras.forEach(e=>{
    if(e&&e.bbox&&(e.bbox.w>0||e.bbox.h>0))
      boxes.push({x:e.bbox.x,y:e.bbox.y,w:e.bbox.w,h:e.bbox.h,label:'Extra',nome:e.desc||'Extra',
        marca:'',conf:null,catalogMatch:null,status:'extra',productKey:'extra_'+e.desc});
  });

  if(boxes.length&&imgSrcs.audit)buildOverlay(imgSrcs.audit,boxes,results);

  let html='<div class="total-bar">'+
    '<div class="total-score" style="color:'+(score>=80?'var(--ok)':score>=55?'var(--warn)':'var(--err)')+'">'+score+'%</div>'+
    '<div class="total-info"><div class="total-title">Conformidade</div>'+
    '<div class="total-sub">'+ok.length+' OK · '+low.length+' baixo · '+miss.length+' ausentes</div>'+
    '<div class="prog"><div class="prog-fill" style="width:'+score+'%;background:'+(score>=80?'var(--ok)':score>=55?'var(--warn)':'var(--err)')+'"></div></div></div></div>'+
    '<div class="score-row">'+
    '<div class="sc"><div class="sc-n" style="color:var(--ok)">'+ok.length+'</div><div class="sc-l">OK</div></div>'+
    '<div class="sc"><div class="sc-n" style="color:var(--warn)">'+low.length+'</div><div class="sc-l">Baixo</div></div>'+
    '<div class="sc"><div class="sc-n" style="color:var(--err)">'+miss.length+'</div><div class="sc-l">Ausentes</div></div></div>';

  if(ok.length){
    html+='<div class="shelf-block"><div class="shelf-label">✅ Encontrados</div>';
    ok.forEach(p=>{const c=Math.round((p.conf||.9)*100);
      let ih='';if(catalogLoaded){const ci=catalog.find(x=>x.id===p.id);if(ci&&ci.image_link)ih='<img style="width:50px;height:50px;border-radius:6px;object-fit:contain;background:var(--s2)" src="'+ci.image_link+'" onerror="this.style.display=\'none\'">';}
      html+='<div class="item">'+ih+'<div class="item-left"><div class="item-brand">'+p.nome+'</div>'+
        '<div class="item-meta"><span class="meta-pill">'+p.id+'</span><span class="meta-pill">'+(p.facings||1)+'f</span>'+
        (p.shelf?'<span class="meta-pill">'+p.shelf+'</span>':'')+'</div>'+
        '<div class="conf-bar"><div class="conf-fill" style="width:'+c+'%;background:'+(c>=90?'var(--ok)':c>=75?'var(--warn)':'var(--err)')+'"></div></div>'+
        '</div><div class="badge '+(c>=90?'b-ok':c>=75?'b-warn':'b-err')+'">'+c+'%</div></div>'});
    html+='</div>';
  }
  if(low.length){
    html+='<div class="shelf-block"><div class="shelf-label">⚠️ Baixo estoque</div>';
    low.forEach(p=>{html+='<div class="item"><div class="item-left"><div class="item-brand">'+p.nome+'</div>'+
      '<div class="item-meta"><span class="meta-pill">'+p.id+'</span><span class="meta-pill">'+(p.facings||1)+'f</span>'+
      (p.obs?'<span class="meta-pill">'+p.obs+'</span>':'')+'</div></div><div class="badge b-warn">Repor</div></div>'});
    html+='</div>';
  }
  if(miss.length){
    html+='<div class="shelf-block"><div class="shelf-label">🚨 Ruptura</div>';
    miss.forEach(id=>{const prod=catList.find(l=>l.startsWith(id+'|'));
      html+='<div class="item"><div class="item-left"><div class="item-name">'+(prod?prod.split('|')[1]:id)+'</div></div><div class="badge b-err">Ruptura</div></div>'});
    html+='</div>';
  }
  if(d.obs)html+='<div class="obs-box">💬 '+d.obs+'</div>';
  html+='<button class="btn btn-g" style="margin-top:12px" onclick="resetAudit()">Nova auditoria</button>';
  results.insertAdjacentHTML('beforeend',html);
  results.scrollIntoView({behavior:'smooth',block:'start'});
}
